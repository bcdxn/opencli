version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: "ocli"
    main: "./cmd/ocli/main.go"
    binary: "ocli"
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .Binary }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [zip]

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

git:
  prerelease_suffix: "-alpha."

release:
  draft: true
  replace_existing_draft: true
  replace_existing_artifacts: true
  prerelease: auto
  make_latest: true
  header: ""
  footer: |
    ## Additional Links
    - [Interactive OpenCLI Spec document editor](https://opencli.dev)
    - [CLI Reference Docs](https://opencli.dev/reference)

    ## Installation
    
    ### 🍺 macOS (Recommended via Homebrew)
    The easiest way to install on macOS is through Homebrew. This compiles the tool from source on your machine:
    
    ```sh
    brew install bcdxn/tap/ocli
    ```

    ## Manual Binary Download

    <details><summary>Windows</summary>
    
    Windows binaries can be downloaded and extracted natively using PowerShell. 
    
    #### Option A: x86_64 Windows (Most Common)

    ```powershell
    # Download and extract in a single step
    Invoke-RestMethod -Uri "https://github.com/bcdxn/opencli/releases/download/{{ .Tag }}/{{ .Binary }}_Windows_x86_64.zip" -OutFile "{{ .Binary }}.zip"
    Expand-Archive -Path "{{ .Binary }}.zip" -DestinationPath ".\{{ .Binary }}" -Force; Remove-Item "{{ .Binary }}.zip"
    ```
    
    #### Option B: ARM64 Windows

    ```powershell
    # Download and extract in a single step
    Invoke-RestMethod -Uri "https://github.com/bcdxn/opencli/releases/download/{{ .Tag }}/{{ .Binary }}_Windows_arm64.zip" -OutFile "{{ .Binary }}.zip"
    Expand-Archive -Path "{{ .Binary }}.zip" -DestinationPath ".\{{ .Binary }}" -Force; Remove-Item "{{ .Binary }}.zip"
    ```
    
    > [!TIP]
    > After extracting, add the absolute path of the `.\{{ .ProjectName }}` folder to your system environment `PATH` variable to execute `ocli` globally.
    </details>

    
    <details><summary>MacOS</summary>
    
    #### Option A: Apple Silicon

    ```sh
    # Download and extract using curl
    curl -L -O https://github.com/bcdxn/opencli/releases/download/{{ .Tag }}/{{ .Binary }}_Darwin_arm64.tar.gz
    tar -xzf {{ .Binary }}_Darwin_arm64.tar.gz
    
    # Strip the quarantine flag and move to your path
    xattr -d com.apple.quarantine ocli
    mv ocli /usr/local/bin/
    ```
    
    #### Option B: Intel Macs

    ```sh
    # Download and extract using wget
    curl -L -O https://github.com/bcdxn/opencli/releases/download/{{ .Tag }}/{{ .Binary }}_Darwin_x86_64.tar.gz
    tar -xzf {{ .Binary }}_Darwin_x86_64.tar.gz
    
    # Strip the quarantine flag and move to your path
    xattr -d com.apple.quarantine ocli
    mv ocli /usr/local/bin/
    ```

    <details><summary>Linux</summary>
    Linux binaries are distributed as standalone compressed archives. Run these commands to pull, extract, and globally install the application.
    
    #### Option A: x86_64 Linux

    ```sh
    # Download, extract, and clean up the archive
    curl -L https://github.com/bcdxn/opencli/releases/download/{{ .Tag }}/{{ .Binary }}_Linux_x86_64.tar.gz | tar -xzf - ocli
    
    # Move the binary into your system PATH
    sudo mv ocli /usr/local/bin/
    ```
    
    #### Option B: ARM64 Linux

    ```sh
    # Download, extract, and clean up the archive
    curl -L https://github.com/bcdxn/opencli/releases/download/{{ .Tag }}/{{ .Binary }}_Linux_arm64.tar.gz | tar -xzf - ocli
    
    # Move the binary into your system PATH
    sudo mv ocli /usr/local/bin/
    ```
    </details>
    
    ---
    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).


homebrew_casks:
  -
    name: ocli
    binaries:
      - ocli
    url:
      template: "https://github.com/bcdxn/opencli/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
      verified: "github.com/opencli/opencli/"
    commit_msg_template: "Brew cask update for {{ .ProjectName }} version {{ .Tag }}"
    directory: Casks
    homepage: "https://opencli.dev"
    description: "CLI to manage OpenCLI Specification documents"
    repository:
      owner: openclidev
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    hooks:
      post:
        # replace foo with the actual binary name
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/ocli"]
          end
