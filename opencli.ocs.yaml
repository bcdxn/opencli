opencliVersion: "1.0.0-alpha.10"

info:
  title: "OpenCLI"
  summary: "A CLI for working with OpenCLI Specs"
  description: |
    `ocli` is a command line interface designed to make working with [OpenCLI
    Spec documents](https://github.com/bcdxn/opencli/tree/main) easier. It provides a number of capabilities, including:

    - validating OpenCLI Spec documents
    - generating Documentation from OpenCLI Spec documents

    The commands are documented below. You can also find out more about each
    command using the contextual `--help` flag. e.g.:

    ```sh
    ocli gen --help
    ```
  version: "1.0.0-alpha.10"
  binary: "ocli"
  license:
    name: "MIT"
    spdxId: "MIT"
    url: "https://spdx.org/licenses/MIT.html"
  contact:
    name: "OpenCLI Team"
    url: "https://github.com/bcdxn/opencli"

install:
  - name: "Binary Download"
    url: "https://github.com/bcdxn/opencli/releases"
    description: |
      You can visit the GitHub releases page of the project to download pre-compiled binaries
      appropriate for your system.
  - name: "Go Install"
    command: "go install github.com/bcdxn/opencli/cmd/cobra@latest"

global:
  exitCodes:
    - code: 0
      status: "OK"
      summary: "The command was successful"
    - code: 1
      status: "INTERNAL_CLI_ERROR"
      summary: "The command failed"
    - code: 2
      status: "BAD_USER_INPUT_ERROR"
      summary: "Missing or invalid input"
  config:
    yaml: ~/.ocli/config.yaml
  flags:
    - name: "help"
      summary: "contextual help"
      type: boolean
      default: false
    - name: "version"
      summary: "print the version of the CLI"
      type: boolean
      default: false

commands:
  ocli {command} <arguments> [flags]:
    group: true

  ocli check <path-to-spec>:
    summary: "Check an OpenCLI Spec document for errors"
    description: |
      The `check` command will validate an OpenCLI Spec document and return any
      errors that are found.
    args:
      - name: "path-to-spec"
        summary: The path to the OpenCLI Spec document to check
        description: |
          this command will check the validity of the given OpenCLI document
          by parsing it and checking it against the OpenCLI Specification.

          > [!TIP]
          > The format of the input file will be determined by the file extension.
        required: true
        type: "string"
    flags:
      - name: "fail-on-err"
        summary: "Return a non-zero exit code if validation fails"
        type: "boolean"
        default: true
    examples:
      - title: Validate a spec document
        content: |
          $ ocli check ./examples/petstore-cli.ocs.yaml
          # ✓ Checking ./examples/petstore-cli.ocs.yaml
          #   Format: yaml
          # ✓ Document is valid

  ocli gen {command} [flags]:
    summary: "Commands used to generate code/docs from an OpenCLI Spec document"
    aliases:
      - "gen"
    group: true

  ocli gen docs [flags]:
    summary: "Generate documentation"
    description: |
      The `ocli gen docs` command will generate documentation from an OpenCLI
      Spec document. You can specify the format of the documentation to be
      generated using the `--format` flag.
    args:
      - name: "path-to-spec"
        summary: "Path to the OpenCLI Spec document"
        required: true
        type: "string"
    flags:
      - name: "format"
        aliases: ["f"]
        summary: "The format of the documentation to generate"
        type: "string"
        required: true
        choices:
          - value: "markdown"
            description: "Plain text using standard [Markdown](https://commonmark.org)."
          - value: "html-page"
            description: "Full standalone HTML document"
          - value: "html-embed"
            description: "An embeddable js bundle including CSS and HTML"
          # coming soon
          # - value: "man"
          #   description: "Plain text using [Man Page](https://en.wikipedia.org/wiki/Man_page) formatting"
        alternativeSources:
          - type: "$ENV"
            property: "OCLI_DOCS_FORMAT"
          - type: "$FILE"
            property: "$.docs.format"
      - name: out
        aliases: ["o"]
        summary: "The path to the directory where the generated docs will be written"
        required: true
        type: "string"
        default: "./docs"
      - name: "no-footer"
        summary: "Do not include the footer in the docs"
        type: "boolean"
        default: false
      - name: "no-badge"
        summary: "Do not include the OpenCLI badge"
        type: "boolean"
        default: false
    examples:
      - title: "generate markdown docs"
        content: |
          $ ocli gen docs -f markdown ./my-cli.ocs.yaml
          # → Reading spec:       ./my-cli.ocs.yaml
          # → Generating docs:    format=markdown, output=./docs
          # ✓ Documentation written to: docs/my-cli.ocs.md

  ocli gen cli [flags]:
    summary: "Generate CLI Boilerplate code"
    description: |
      The `ocli gen cli` command will generate the boilerplate code for
      various CLI frameworks from an OpenCLI Spec document.
    args:
      - name: "path-to-spec"
        summary: "The spec used to generate the code"
        required: true
        type: "string"
    flags:
      - name: out
        aliases: ["o"]
        summary: "The path to the directory where the generated code will be output"
        required: true
        type: "string"
      - name: "framework"
        aliases: ["f"]
        summary: "The framework of the CLI boilerplate to generate"
        required: true
        type: "string"
        choices:
          - value: "cobra"
            description: "[Cobra](https://github.com/spf13/cobra?tab=readme-ov-file) is a popular CLI framework for Go"
          # coming soon...
          # - value: "urfavecli"
          #   description: "[urfave/cli](https://github.com/urfave/cli) is a declarative CLI framework for Go"
          - value: "yargs"
            description: "[yargs](https://yargs.js.org) is a popular CLI framework for Node.js"
          # - value: "oclif"
          #   description: "[oclif](https://oclif.io) is a popular CLI framework written in Typescript"
        alternativeSources:
          - type: "$ENV"
            property: "OCLI_CLI_FRAMEWORK"
          - type: "$FILE"
            property: "$.cli.framework"