name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write
  code-quality: write

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Go Generate
        run: go generate $(go list ./... | grep -v /web/) 

      - name: Test
        run: go test -v -race -covermode=atomic -coverprofile=coverage.txt $(go list ./... | grep -v /web/) 
      - name: Check Coverage Total (Terminal Summary)
        run: |
          go tool cover -func=coverage.txt
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}


      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ./web/package-lock.json

      - name: Build
        run: make build-ui

      - name: Upload Pages Distribution Files
        uses: actions/upload-artifact@v7
        with:
          name: github-pages
          path: ./web/out
  
  trigger-release-gh-pages:
    name: Trigger Release GH Pages
    needs: ci
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/release-gh-pages.yaml
    permissions:
      contents: write
      pages: write
      id-token: write
    secrets: inherit
  
  trigger-release-cli:
    name: Trigger Release CLI
    needs: ci
    if: startsWith(github.ref, 'refs/tags/')
    uses: ./.github/workflows/release-cli.yaml
    with:
      target_ref: ${{ github.ref_name }}
    permissions:
      contents: write
    secrets: inherit
